<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameCritique - Accueil</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="img/profil.png">
    <style>
        body, button, input, select, textarea, h1, h2, h3, h4, p, span, a {
            font-family: 'Poppins', sans-serif !important;
        }
        
        #btn {
            font-family: Arial, sans-serif !important;
            display: inline-flex !important;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50% !important;
            background: #fff !important;
            color: #2b1055 !important;
            text-decoration: none !important;
            transition: all 0.3s ease !important;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3) !important;
            padding: 0 !important;
            line-height: 1 !important;
            font-size: 1.1rem !important;
            border: none !important;
        }
        #btn:hover {
            transform: translateY(5px) scale(1.05) !important;
            background: #2b1055 !important;
            color: #fff !important;
            box-shadow: 0 8px 20px rgba(43,16,85,0.4) !important;
        }
    </style>
</head>

<body>
    <header>
        <a href="index.html" class="logo">GameCritique</a>
        <ul id="nav-links">
            <li><a href="index.html" class="active">Accueil</a></li>
            <li><a href="jeux.html">Jeux</a></li>
            <!-- Inséré dynamiquement : Admin et Profil/Connexion -->
        </ul>
    </header>
    <section>
        <img src="img/stars.png" alt="" id="stars">
        <img src="img/moon2.png" alt="" id="moon">
        <img src="img/citybg.png" alt="" id="mountains_behind">
        <h2 id="text">Game</h2>
        <h2 id="text2">Critique</h2>
        <a href="#presentation" id="btn">▼</a>
        <img src="img/mountains_front5.png" alt="" id="mountains_front">
    </section>
    
    <div class="sec" id="presentation">
        <div class="container-fluid ">
            <div class="row">
                <div class="col-12">
                    <h2 class="text-center mb-5 text-white" style="font-family: 'Poppins', sans-serif; font-size: 2.5rem; letter-spacing: 2px;">Dernières Critiques</h2>
                    <div class="row" id="latest-reviews-container">
                        <!-- Critiques chargées dynamiquement -->
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- Modal d'authentification -->
    <div class="modal-overlay" id="auth-modal">
        <div class="gc-modal">
            <button class="close-btn" id="close-auth-btn">&times;</button>
            
            <!-- Formulaire de Connexion -->
            <div id="login-section">
                <h2>Connexion</h2>
                <form class="gc-form" id="login-form">
                    <label for="login-email">Adresse E-mail</label>
                    <input type="email" id="login-email" required placeholder="nom@exemple.com">
                    
                    <label for="login-password">Mot de passe</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                    
                    <button type="submit" class="gc-btn-submit">Se connecter</button>
                </form>
                <div class="text-center my-3 text-white-50">ou</div>
                <button class="btn-google-login w-100" id="google-login-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                    </svg>
                    Connexion avec Google
                </button>
                <p class="text-center mt-3 text-white-50 font-size-0.9">
                    Nouveau ici ? <a href="#" id="go-to-signup" class="text-white fw-bold">Créer un compte</a>
                </p>
            </div>

            <!-- Formulaire d'Inscription -->
            <div id="signup-section" style="display: none;">
                <h2>Créer un compte</h2>
                <form class="gc-form" id="signup-form">
                    <label for="signup-name">Nom d'affichage</label>
                    <input type="text" id="signup-name" required placeholder="Ex: PlayerOne">

                    <label for="signup-email">Adresse E-mail</label>
                    <input type="email" id="signup-email" required placeholder="nom@exemple.com">
                    
                    <label for="signup-password">Mot de passe</label>
                    <input type="password" id="signup-password" required placeholder="••••••••">
                    
                    <button type="submit" class="gc-btn-submit">S'inscrire</button>
                </form>
                <p class="text-center mt-3 text-white-50 font-size-0.9">
                    Déjà inscrit ? <a href="#" id="go-to-login" class="text-white fw-bold">Se connecter</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="db.js"></script>
    <script>
        // Parallaxe
        let stars = document.getElementById('stars');
        let moon = document.getElementById('moon');
        let mountains_behind = document.getElementById('mountains_behind');
        let text = document.getElementById('text');
        let text2 = document.getElementById('text2');
        let btn = document.getElementById('btn');
        let mountains_front = document.getElementById('mountains_front');
        let header = document.querySelector('header');

        window.addEventListener('scroll', function () {
            let value = window.scrollY;
            stars.style.left = value * 0.25 + 'px';
            moon.style.top = value * 1.05 + 'px';
            mountains_behind.style.top = value * 0.5 + 'px';
            mountains_front.style.top = value * 0 + 'px';
            text.style.marginRight = value * 4 + 'px';
            text.style.marginTop = value * 1.5 + 'px';
            btn.style.marginTop = value * 1.5 + 'px';
            header.style.top = value * 0.5 + 'px';

            text2.style.marginLeft = value * 4 + 'px';
            text2.style.marginTop = value * 1.5 + 'px';
        });

        // Gestion de l'authentification et de l'UI
        const authModal = document.getElementById('auth-modal');
        const loginSection = document.getElementById('login-section');
        const signupSection = document.getElementById('signup-section');
        const navLinks = document.getElementById('nav-links');

        function openAuthModal() {
            authModal.classList.add('show');
            showLogin();
        }

        function closeAuthModal() {
            authModal.classList.remove('show');
        }

        function showLogin() {
            loginSection.style.display = 'block';
            signupSection.style.display = 'none';
        }

        function showSignup() {
            loginSection.style.display = 'none';
            signupSection.style.display = 'block';
        }

        function updateUI() {
            const user = GameCritiqueDB.auth.getCurrentUser();
            
            // Reconstruire la navigation
            navLinks.innerHTML = `
                <li><a href="index.html" class="active">Accueil</a></li>
                <li><a href="jeux.html">Jeux</a></li>
            `;

            if (user) {
                if (user.role === 'admin') {
                    navLinks.innerHTML += `<li><a href="admin.html">Admin</a></li>`;
                }
                
                navLinks.innerHTML += `
                    <li class="ms-3">
                        <div class="user-menu">
                            <img src="${user.avatar}" alt="Avatar">
                            <span>${user.displayName}</span>
                            <a href="#" id="logout-btn" class="hoverrouge ms-2" style="border-radius:20px; padding:6px 12px;">Déconnexion</a>
                        </div>
                    </li>
                `;
                
                // Binder le bouton déconnexion
                document.getElementById('logout-btn').addEventListener('click', function(e) {
                    e.preventDefault();
                    GameCritiqueDB.auth.logout();
                    updateUI();
                    window.location.reload();
                });
            } else {
                navLinks.innerHTML += `
                    <li class="ms-3">
                        <button class="btn-login" id="open-login-btn">Connexion</button>
                    </li>
                `;
                
                // Binder le bouton connexion
                document.getElementById('open-login-btn').addEventListener('click', openAuthModal);
            }
        }

        // Événements d'auth
        document.getElementById('close-auth-btn').addEventListener('click', closeAuthModal);
        document.getElementById('go-to-signup').addEventListener('click', function(e) { e.preventDefault(); showSignup(); });
        document.getElementById('go-to-login').addEventListener('click', function(e) { e.preventDefault(); showLogin(); });

        // Soumission Formulaire Connexion
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            try {
                GameCritiqueDB.auth.login(email, pass);
                closeAuthModal();
                updateUI();
                window.location.reload();
            } catch(err) {
                alert(err.message);
            }
        });

        // Soumission Formulaire Inscription
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const pass = document.getElementById('signup-password').value;
            try {
                GameCritiqueDB.auth.signUp(email, pass, name);
                closeAuthModal();
                updateUI();
                window.location.reload();
            } catch(err) {
                alert(err.message);
            }
        });

        // Connexion Google
        document.getElementById('google-login-btn').addEventListener('click', function() {
            const width = 500, height = 600;
            const left = (window.innerWidth - width) / 2;
            const top = (window.innerHeight - height) / 2;
            window.open('google-login.html', 'GoogleAuth', `width=${width},height=${height},left=${left},top=${top}`);
        });

        // Écouter les messages de la pop-up Google Login
        window.addEventListener("message", function(event) {
            if (event.data && event.data.source === "google-login") {
                GameCritiqueDB.auth.loginWithGoogle(event.data.email, event.data.displayName);
                closeAuthModal();
                updateUI();
                window.location.reload();
            }
        });

        // Charger les dernières critiques
        function renderLatestReviews() {
            const container = document.getElementById('latest-reviews-container');
            const reviews = GameCritiqueDB.reviews.getAll().slice(0, 3);
            
            if (reviews.length === 0) {
                container.innerHTML = `<p class="text-center text-white-50">Aucune critique disponible pour le moment.</p>`;
                return;
            }

            container.innerHTML = reviews.map(review => {
                const date = new Date(review.createdAt).toLocaleDateString('fr-FR');
                return `
                    <div class="col-md-4 mb-4">
                        <div class="card bg-dark text-white border-secondary h-100">
                            <div style="height: 180px; overflow: hidden; background: #111; display:flex; align-items:center; justify-content:center;">
                                <img src="${review.imageUrl}" class="card-img-top" alt="${review.title}" style="max-height: 100%; max-width: 100px; object-fit: contain;">
                            </div>
                            <div class="card-body d-flex flex-column">
                                <span class="badge bg-secondary mb-2 w-fit-content">${review.category}</span>
                                <h5 class="card-title">${review.title}</h5>
                                <p class="card-text text-white-50 flex-grow-1">${review.synopsis}</p>
                                <div class="mt-3 d-flex justify-content-between align-items-center">
                                    <span class="text-warning fw-bold fs-5">${review.overallScore}/100</span>
                                    <a href="critique.html?id=${review.id}" class="btn btn-sm btn-outline-light">Voir le test</a>
                                </div>
                            </div>
                            <div class="card-footer text-muted border-secondary d-flex justify-content-between" style="font-size:0.8em;">
                                <span>Par ${review.author}</span>
                                <span>Le ${date}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Init
        document.addEventListener('DOMContentLoaded', function() {
            updateUI();
            renderLatestReviews();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>

</html>
